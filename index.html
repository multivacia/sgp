<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SGP — Sistema de Gestão da Produção" />
    <script>
      (function () {
        try {
          var k = 'sgp.colorTheme'
          var t = localStorage.getItem(k)
          var v =
            t === 'slate-dark' || t === 'light-executive' || t === 'argos-dark'
              ? t
              : 'argos-dark'
          document.documentElement.setAttribute('data-theme', v)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'argos-dark')
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>SGP Web</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
